  width: 90%;

    input[type="text"] {

  margin-bottom: 15px;
  background-color: #f5f5f5;
  color: #333;
  font-size: 16px;
  transition: all 0.3s ease;
  box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
}

input[type="text"]:focus {
  outline: none;
  background-color: #ffffff;
  box-shadow: 0 2px 8px rgba(0, 170, 255, 0.3);
  transform: translateY(-2px);
}

input[type="text"]::placeholder {
  color: #888;
}

.light-mode input[type="text"] {
  background-color: #f8f8f8;
  color: #333;
  border: 1px solid #e0e0e0;
}

.light-mode input[type="text"]:focus {
  background-color: #ffffff;
  border-color: #00aaff;
  box-shadow: 0 2px 8px rgba(0, 170, 255, 0.2);
}

    button {
      padding: 10px 20px;
      border: none;
      border-radius: 8px;
      background-color: #0077cc;
      color: white;

      font-size: 16px;

      box-shadow: 0 0 10px #aaa;
    }

}


    .progress-bar {

.hourly-forecast {
  margin-top: 20px;
  overflow-x: auto;
  display: flex;
  gap: 8px;
  padding-bottom: 10px;
  -webkit-overflow-scrolling: touch;
  width: 100%;
  box-sizing: border-box;
}


/* Hide scrollbar but keep functionality */
.hourly-forecast::-webkit-scrollbar {
  display: none;
}

.hour-box {
  background: rgba(255, 255, 255, 0.1);
  border-radius: 8px;
  padding: 8px;
  min-width: 70px;
  text-align: center;
  flex-shrink: 0; /* Prevent boxes from shrinking */
}

    }


    /* Tablet and larger mobile */
@media (max-width: 768px) {
  .container {
    padding: 15px;
    width: 95%;
  }
  
  input[type="text"] {
  padding: 10px;
  border-radius: 8px;
  border: none;
  width: 90%;

}
}

/* for the Small mobile devices */
@media (max-width: 480px) {
  h1 {
    font-size: 24px;
  }
  
  button {
    padding: 8px 16px;
    font-size: 14px;
  }

    font-size: 14px;
  }
}

.contact-footer {
  width: 100%;
  text-align: center;
  padding: 15px 10px;
  border-top: 1px solid #0f7fb8;
  margin-top: auto;
  font-size: 16px;
  background-color:  #0f7fb8;
  color: white;
  transition: background 0.5s, color 0.5s;
}

.contact-footer p {
  margin: 0 0 10px 0;
}

.contact-footer a {
  color: white;
  margin: 0 10px;
  font-size: 20px;
  text-decoration: none;
  transition: all 0.3s ease;
}

.contact-footer a:hover {
  color: #003366;
  transform: scale(1.2);
}

.light-mode .contact-footer {
  background-color: #0f7fb8;
  color: white;
  border-top: 1px solid #0f7fb8;
}

.light-mode .contact-footer a {
  color: white;
}

.light-mode .contact-footer a:hover {
  color: #003366;
  transform: scale(1.2);
}

/* ===== WEATHER ANIMATIONS ===== */

/* Sunny Animation */
.sun {
  width: 60px;
  height: 60px;
  background: #ffde00;
  border-radius: 50%;
  position: relative;
  animation: rotateSun 10s linear infinite;
  box-shadow: 0 0 30px #ffde00;
}

.sun::before, .sun::after {
  content: '';
  position: absolute;
  background: #ffde00;
  border-radius: 50%;
}

.sun::before {
  width: 80px;
  height: 20px;
  top: 20px;
  left: -10px;
}

.sun::after {
  width: 20px;
  height: 80px;
  left: 20px;
  top: -10px;
}

@keyframes rotateSun {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* Rain Animation */
.rain-container {
  position: relative;
  width: 100px;
  height: 100px;
}

.raindrop {
  position: absolute;
  width: 3px;
  height: 15px;
  background: linear-gradient(to bottom, transparent, #4b6cb7);
  border-radius: 0 0 5px 5px;
  animation: rainFall 1.5s linear infinite;
}

.raindrop:nth-child(1) { left: 20%; animation-delay: 0s; }
.raindrop:nth-child(2) { left: 40%; animation-delay: 0.2s; }
.raindrop:nth-child(3) { left: 60%; animation-delay: 0.4s; }
.raindrop:nth-child(4) { left: 80%; animation-delay: 0.6s; }
.raindrop:nth-child(5) { left: 30%; animation-delay: 0.8s; }
.raindrop:nth-child(6) { left: 70%; animation-delay: 1s; }

@keyframes rainFall {
  0% { transform: translateY(-20px); opacity: 0; }
  50% { opacity: 1; }
  100% { transform: translateY(80px); opacity: 0; }
}

/* Snow Animation */
.snow-container {
  position: relative;
  width: 100px;
  height: 100px;
}

.snowflake {
  position: absolute;
  width: 6px;
  height: 6px;
  background: white;
  border-radius: 50%;
  filter: blur(1px);
  animation: snowFall 3s linear infinite;
}

.snowflake:nth-child(1) { left: 20%; animation-delay: 0s; }
.snowflake:nth-child(2) { left: 50%; animation-delay: 1s; }
.snowflake:nth-child(3) { left: 80%; animation-delay: 2s; }
.snowflake:nth-child(4) { left: 30%; animation-delay: 1.5s; }
.snowflake:nth-child(5) { left: 70%; animation-delay: 0.5s; }

@keyframes snowFall {
  0% { 
    transform: translateY(-20px) translateX(0px); 
    opacity: 0; 
  }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { 
    transform: translateY(80px) translateX(20px); 
    opacity: 0; 
  }
}

/* Cloud Animation */
.cloud {
  position: relative;
  width: 80px;
  height: 40px;
  background: #f0f0f0;
  border-radius: 40px;
  animation: floatCloud 6s ease-in-out infinite;
  box-shadow: 0 0 20px rgba(255,255,255,0.3);
}

.cloud::before, .cloud::after {
  content: '';
  position: absolute;
  background: #f0f0f0;
  border-radius: 50%;
}

.cloud::before {
  width: 30px;
  height: 30px;
  top: -15px;
  left: 15px;
}

.cloud::after {
  width: 40px;
  height: 40px;
  top: -20px;
  right: 15px;
}

@keyframes floatCloud {
  0%, 100% { transform: translateX(0px) translateY(0px); }
  50% { transform: translateX(20px) translateY(-5px); }
}

/* Lightning Animation */
.lightning {
  position: relative;
  width: 4px;
  height: 20px;
  background: #ffde00;
  animation: lightningFlash 4s infinite;
  box-shadow: 0 0 10px #ffde00;
}

.lightning::before {
  content: '';
  position: absolute;
  width: 0;
  height: 0;
  border-left: 8px solid transparent;
  border-right: 8px solid transparent;
  border-bottom: 12px solid #ffde00;
  top: -12px;
  left: -6px;
}

@keyframes lightningFlash {
  0%, 85%, 100% { opacity: 0; }
  90%, 95% { opacity: 1; }
}

/* Wind Animation */
.wind-container {
  position: relative;
  width: 150px;
  height: 50px;
}

.wind-line {
  position: relative;
  height: 2px;
  background: linear-gradient(90deg, transparent, #ffffff, transparent);
  margin: 10px 0;
  animation: windBlow 2s linear infinite;
}

.wind-line:nth-child(2) { animation-delay: 0.5s; }
.wind-line:nth-child(3) { animation-delay: 1s; }

@keyframes windBlow {
  0% { 
    transform: translateX(-100px);
    opacity: 0;
  }
  50% { opacity: 0.7; }
  100% { 
    transform: translateX(100px);
    opacity: 0;
  }
}

/* Fog/Mist Animation */
.fog-container {
  position: relative;
  width: 150px;
  height: 80px;
}

.fog-layer {
  position: absolute;
  width: 100%;
  height: 20px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
  border-radius: 10px;
  animation: fogMove 8s linear infinite;
}

.fog-layer:nth-child(2) { top: 30px; animation-delay: 2s; }
.fog-layer:nth-child(3) { top: 60px; animation-delay: 4s; }

@keyframes fogMove {
  0% { transform: translateX(-100px); opacity: 0; }
  50% { opacity: 0.5; }
  100% { transform: translateX(100px); opacity: 0; }
}


/* Moon Animation for Night Time */
.moon {
  width: 60px;
  height: 60px;
  background: #f0f0f0;
  border-radius: 50%;
  position: relative;
  animation: floatMoon 8s ease-in-out infinite;
  box-shadow: 
    0 0 20px rgba(255,255,255,0.5),
    inset -15px 0px 0px #e0e0e0;
}

.moon::before {
  content: '';
  position: absolute;
  width: 15px;
  height: 15px;
  background: #d0d0d0;
  border-radius: 50%;
  top: 15px;
  left: 10px;
  box-shadow: 
    20px 10px 0 0px #d0d0d0,
    10px 25px 0 0px #d0d0d0;
}

@keyframes floatMoon {
  0%, 100% { transform: translateY(0px) rotate(0deg); }
  50% { transform: translateY(-10px) rotate(5deg); }
}

/* Night Cloud Style */
.night-cloud {
  background: #a0a0a0;
  box-shadow: 0 0 15px rgba(200,200,200,0.2);
}

.night-cloud::before,
.night-cloud::after {
  background: #a0a0a0;
}




/* ===== BACKGROUND ANIMATIONS ===== */
#animatedBackground {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
  pointer-events: none;
}

/* Animated Gradient Sky */
.animated-sky {
  background: linear-gradient(-45deg, #ee7752, #e73c7e, #23a6d5, #23d5ab);
  background-size: 400% 400%;
  animation: gradientShift 15s ease infinite;
}

@keyframes gradientShift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

/* Floating Particles/Dust */
.particles-background {
  position: relative;
  overflow: hidden;
}

.particle {
  position: absolute;
  background: rgba(255, 255, 255, 0.5);
  border-radius: 50%;
  animation: floatParticle 20s infinite linear;
}

.particle:nth-child(1) { width: 3px; height: 3px; left: 10%; animation-duration: 25s; }
.particle:nth-child(2) { width: 2px; height: 2px; left: 20%; animation-duration: 30s; animation-delay: 2s; }
.particle:nth-child(3) { width: 4px; height: 4px; left: 30%; animation-duration: 20s; animation-delay: 4s; }
.particle:nth-child(4) { width: 3px; height: 3px; left: 40%; animation-duration: 35s; animation-delay: 1s; }
.particle:nth-child(5) { width: 2px; height: 2px; left: 50%; animation-duration: 28s; animation-delay: 3s; }

@keyframes floatParticle {
  0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
  10% { opacity: 1; }
  90% { opacity: 1; }
  100% { transform: translateY(-100px) rotate(360deg); opacity: 0; }
}

/* Pulsing Aurora Effect */
.aurora-background {
  background: 
    radial-gradient(circle at 20% 80%, rgba(120, 119, 198, 0.3) 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(255, 119, 198, 0.3) 0%, transparent 50%),
    radial-gradient(circle at 40% 40%, rgba(120, 219, 255, 0.3) 0%, transparent 50%),
    linear-gradient(135deg, #000428, #004e92);
  animation: auroraPulse 8s ease-in-out infinite;
}

@keyframes auroraPulse {
  0%, 100% { 
    filter: hue-rotate(0deg) brightness(1);
    background-size: 200% 200%, 200% 200%, 200% 200%, 100% 100%;
  }
  50% { 
    filter: hue-rotate(45deg) brightness(1.1);
    background-size: 250% 250%, 250% 250%, 250% 250%, 100% 100%;
  }
}

/* Fixed Moving Cloud Layers */
.cloud-background {
  background: linear-gradient(to bottom, #87CEEB, #98FB98);
  position: relative;
  overflow: hidden;
}

.cloud-layer {
  position: absolute;
  width: 200%;
  height: 100px;
  background: rgba(255, 255, 255, 0.3);
  border-radius: 50px;
  animation: moveClouds 60s linear infinite;
  filter: blur(5px);
}

.cloud-layer:nth-child(1) { 
  top: 10%; 
  animation-duration: 80s; 
  opacity: 0.6; 
  height: 80px;
}
.cloud-layer:nth-child(2) { 
  top: 30%; 
  animation-duration: 60s; 
  opacity: 0.4; 
  height: 60px;
}
.cloud-layer:nth-child(3) { 
  top: 50%; 
  animation-duration: 40s; 
  opacity: 0.2; 
  height: 70px;
}

@keyframes moveClouds {
  0% { transform: translateX(-50%); }
  100% { transform: translateX(0%); }
}

/* Rainbow Wave Effect */
.rainbow-wave {
  background: linear-gradient(45deg, 
    #ff0000, #ff8000, #ffff00, #00ff00, 
    #00ffff, #0000ff, #8000ff, #ff0080);
  background-size: 400% 400%;
  animation: rainbowWave 10s ease infinite;
}

@keyframes rainbowWave {
  0% { 
    background-position: 0% 50%;
    filter: hue-rotate(0deg);
  }
  50% { 
    background-position: 100% 50%;
    filter: hue-rotate(180deg);
  }
  100% { 
    background-position: 0% 50%;
    filter: hue-rotate(360deg);
  }
}

/* Starry Night Sky */
.starry-night {
  background: linear-gradient(to bottom, #0f0c29, #302b63, #24243e);
  position: relative;
}

.star {
  position: absolute;
  background: white;
  border-radius: 50%;
  animation: twinkle 4s infinite;
}

.star:nth-child(1) { top: 10%; left: 20%; width: 2px; height: 2px; animation-delay: 0s; }
.star:nth-child(2) { top: 20%; left: 50%; width: 3px; height: 3px; animation-delay: 1s; }
.star:nth-child(3) { top: 30%; left: 70%; width: 1px; height: 1px; animation-delay: 2s; }
.star:nth-child(4) { top: 40%; left: 30%; width: 2px; height: 2px; animation-delay: 3s; }
.star:nth-child(5) { top: 60%; left: 80%; width: 3px; height: 3px; animation-delay: 0.5s; }

@keyframes twinkle {
  0%, 100% { opacity: 0.2; transform: scale(1); }
  50% { opacity: 1; transform: scale(1.2); }
}

/* Lightning Storm Effect */
.storm-background {
  background: linear-gradient(to bottom, #2c3e50, #34495e);
  animation: lightningFlash 8s infinite;
}

@keyframes lightningFlash {
  0%, 85%, 100% { 
    filter: brightness(1);
    background: linear-gradient(to bottom, #2c3e50, #34495e);
  }
  90%, 95% { 
    filter: brightness(2);
    background: linear-gradient(to bottom, #4a6491, #5a74a1);
  }
}

/* Bubbling Water Effect */
.water-background {
  background: linear-gradient(to bottom, #1e3c72, #2a5298);
  position: relative;
}

.bubble {
  position: absolute;
  background: rgba(255, 255, 255, 0.1);
  border-radius: 50%;
  animation: bubbleRise 15s infinite linear;
}

.bubble:nth-child(1) { left: 10%; width: 20px; height: 20px; animation-duration: 20s; }
.bubble:nth-child(2) { left: 30%; width: 15px; height: 15px; animation-duration: 25s; animation-delay: 2s; }
.bubble:nth-child(3) { left: 60%; width: 25px; height: 25px; animation-duration: 18s; animation-delay: 4s; }

@keyframes bubbleRise {
  0% { 
    transform: translateY(100vh) scale(0.5);
    opacity: 0;
  }
  10% { 
    opacity: 0.5;
    transform: translateY(90vh) scale(0.8);
  }
  90% { 
    opacity: 0.3;
    transform: translateY(10vh) scale(1.2);
  }
  100% { 
    transform: translateY(-50px) scale(1.5);
    opacity: 0;
  }
}

/* Heat Wave Distortion */
.heat-background {
  background: linear-gradient(45deg, #ff9500, #ff5e00, #ff2a00);
  position: relative;
}

.heat-wave {
  position: absolute;
  width: 100%;
  height: 100%;
  background: linear-gradient(to bottom, transparent, rgba(255, 255, 255, 0.1), transparent);
  animation: heatShimmer 3s infinite linear;
}

@keyframes heatShimmer {
  0% { transform: translateY(-100%); }
  100% { transform: translateY(100%); }
}

/* Meteor Shower */
.meteor-background {
  background: linear-gradient(to bottom, #0f0c29, #302b63);
  position: relative;
}

.meteor {
  position: absolute;
  width: 2px;
  height: 2px;
  background: white;
  border-radius: 50%;
  box-shadow: 0 0 10px 2px white;
  animation: meteorFall 3s infinite linear;
}

.meteor:nth-child(1) { top: 0; left: 10%; animation-delay: 0s; }
.meteor:nth-child(2) { top: 0; left: 30%; animation-delay: 1s; }
.meteor:nth-child(3) { top: 0; left: 60%; animation-delay: 2s; }

@keyframes meteorFall {
  0% { 
    transform: translateY(0) translateX(0);
    opacity: 1;
  }
  100% { 
    transform: translateY(100vh) translateX(100px);
    opacity: 0;
  }
}

 function updateBackground(condition, isDay) {
  const background = document.getElementById('animatedBackground');
  const conditionLower = condition.toLowerCase();
  
  // Clear previous background
  background.innerHTML = '';
  background.className = '';
  
  // Smooth transition
  background.style.transition = 'all 1.5s ease';
  
  if (isDay === 0) {
    // Night backgrounds
    if (conditionLower.includes('clear')) {
      // Clear night - stars and aurora
      background.className = 'starry-night aurora-background';
      background.innerHTML = `
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="star"></div>
        <div class="meteor"></div>
        <div class="meteor"></div>
        <div class="meteor"></div>
      `;
    } else if (conditionLower.includes('rain') || conditionLower.includes('drizzle') || conditionLower.includes('shower')) {
      // Rainy night - storm effect
      background.className = 'storm-background water-background';
      background.innerHTML = `
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
      `;
    } else if (conditionLower.includes('snow') || conditionLower.includes('sleet') || conditionLower.includes('ice')) {
      // Snowy night - particles
      background.className = 'particles-background';
      background.style.background = 'linear-gradient(to bottom, #2c3e50, #4a6491)';
      background.innerHTML = `
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
      `;
    } else if (conditionLower.includes('thunder') || conditionLower.includes('storm')) {
      // Thunderstorm night
      background.className = 'storm-background';
    } else if (conditionLower.includes('cloud') || conditionLower.includes('overcast') || conditionLower.includes('partially')) {
      // Cloudy night - dark animated sky
      background.className = 'animated-sky';
      background.style.background = 'linear-gradient(-45deg, #1a1a2e, #16213e, #0f3460)';
    } else {
      // Default night - animated gradient
      background.className = 'animated-sky';
      background.style.background = 'linear-gradient(-45deg, #0f0c29, #302b63, #24243e)';
    }
  } else {
    // Day backgrounds
    if (conditionLower.includes('sunny') || conditionLower.includes('clear')) {
      // Sunny day - rainbow waves
      background.className = 'animated-sky rainbow-wave';
    } else if (conditionLower.includes('rain') || conditionLower.includes('drizzle') || conditionLower.includes('shower')) {
      // Rainy day - water bubbles
      background.className = 'water-background';
      background.innerHTML = `
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
      `;
    } else if (conditionLower.includes('snow') || conditionLower.includes('sleet') || conditionLower.includes('ice')) {
      // Snowy day - floating particles
      background.className = 'particles-background';
      background.style.background = 'linear-gradient(to bottom, #e0eafc, #cfdef3)';
      background.innerHTML = `
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
      `;
    } else if (conditionLower.includes('cloud') || conditionLower.includes('overcast') || conditionLower.includes('partially')) {
      // Cloudy day - moving clouds 
      background.className = 'cloud-background';
      background.innerHTML = `
        <div class="cloud-layer"></div>
        <div class="cloud-layer"></div>
        <div class="cloud-layer"></div>
      `;
    } else if (conditionLower.includes('thunder') || conditionLower.includes('storm')) {
      // Thunderstorm day
      background.className = 'storm-background';
    } else if (conditionLower.includes('fog') || conditionLower.includes('mist') || conditionLower.includes('haze')) {
      // Foggy day - particles
      background.className = 'particles-background';
      background.style.background = 'linear-gradient(to bottom, #bdc3c7, #2c3e50)';
      background.innerHTML = `
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
      `;
    } else {
      // Default day - animated gradient
      background.className = 'animated-sky';
    }
  }
}

    function getAQILevel(index) {
      const levels = ["Good", "Moderate", "Unhealthy for sensitive groups", "Unhealthy", "Very Unhealthy", "Hazardous"];
      return levels[index - 1] || "Unknown";
    }

    function getUVLevel(uv) {
      if (uv < 3) return `Low (${uv}) – Wear sunglasses`;
      else if (uv < 6) return `Moderate (${uv}) – Use sunscreen`;
      else if (uv < 8) return `High (${uv}) – Protective clothing advised`;
      else return `Very High (${uv}) – Stay indoors during midday`;
    }

    function getClothingSuggestion(temp, condition) {
      if (temp >= 25) return "T-shirt and shorts recommended.";
      else if (temp >= 15) return "Light jacket suggested.";
      else if (temp >= 5) return "Wear a warm coat.";
      else return "Heavy winter wear is necessary.";
    }

    async function getWeather() {
      const location = document.getElementById("locationInput").value;
      const apiKey = "139f720068504a8c87d61339252306";
      const url = `https://api.weatherapi.com/v1/forecast.json?key=${apiKey}&q=${encodeURIComponent(location)}&days=1&aqi=yes&alerts=no`;

      try {
        const response = await fetch(url);
        if (!response.ok) throw new Error("Location not found");

        const data = await response.json();
        const c = data.current;
        const l = data.location;
        updateBackground(c.condition.text, c.is_day);

       showWeatherAnimation(c.condition.text, c.is_day);                               // for the animations

        document.getElementById("weatherResult").innerHTML = `
          <strong>${l.name}, ${l.country}</strong><br>
          <img src="https:${c.condition.icon}" alt="${c.condition.text}" class="weather-icon"><br>
          <strong>${c.condition.text}</strong><br>
          Temperature: <strong>${c.temp_c}&deg;C</strong><br>
          Feels like: <strong>${c.feelslike_c}&deg;C</strong><br>
          <br>
          <strong>Wind:</strong> ${c.wind_kph} kph <span style="display:inline-block; transform: rotate(${c.wind_degree}deg);">🧭</span> ${c.wind_dir}<br>
          <strong>UV Index:</strong> ${getUVLevel(c.uv)}<br>
          <strong>AQI:</strong> ${getAQILevel(c.air_quality["us-epa-index"])}<br>
          <strong>Humidity:</strong> ${c.humidity}%
          <div class="progress-bar">
            <div class="progress-bar-fill" style="width: ${c.humidity}%;"></div>
          </div>
          <strong>Dew Point:</strong> ${c.dewpoint_c}&deg;C → Comfortable
        `;

        const aqi = c.air_quality;
        document.getElementById("airDetails").innerHTML = `
          <strong>Pollutants:</strong><br>
          PM2.5: ${aqi.pm2_5.toFixed(2)} µg/m³ – Can affect lungs<br>
          O₃ (Ozone): ${aqi.o3.toFixed(2)} µg/m³ – May irritate respiratory system<br>
          NO₂: ${aqi.no2.toFixed(2)} µg/m³<Br>
          SO₂: ${aqi.so2.toFixed(2)} µg/m³<Br>
          CO: ${aqi.co.toFixed(2)} µg/m³
        `;

        document.getElementById("clothingSuggestion").innerHTML = `<strong>Clothing Suggestion:</strong> ${getClothingSuggestion(c.temp_c, c.condition.text)}`;

        const hourly = data.forecast.forecastday[0].hour;
       
        const forecastContainer = document.getElementById("hourlyForecast");

// Get current hour at location
const currentHour = parseInt(data.current.last_updated.split(' ')[1].split(':')[0]);

// Find the index of the current hour in hourly array
let startIndex = hourly.findIndex(h => {
  const hHour = parseInt(h.time.split(' ')[1].split(':')[0]);
  return hHour === currentHour;
});

// If not found (rare), default to 0
if (startIndex === -1) startIndex = 0;

// Get next 12 hours from current hour
const next12Hours = hourly.slice(startIndex, startIndex + 12);

forecastContainer.innerHTML = next12Hours.map(h => {
  const timePart = h.time.split(' ')[1];
  let hour = parseInt(timePart.split(':')[0]);
  const ampm = hour >= 12 ? 'PM' : 'AM';
  hour = hour % 12;
  if (hour === 0) hour = 12;

  return `
    <div class="hour-box">
      <div>${hour} ${ampm}</div>
      <img src="https:${h.condition.icon}" width="32" height="32">
      <div>${h.temp_c}&deg;C</div>
    </div>
  `;
}).join('');


      } catch (error) {
        document.getElementById("weatherResult").innerHTML = `<span style="color:red;">${error.message}</span>`;
      }
    }
  </script>
